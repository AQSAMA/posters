name: Compile Typst Posters
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Compile Poster Layout 1
        run: typst compile posters/poster-layout1.typ posters/poster-layout1.pdf

      - name: Compile Poster Layout 2
        run: typst compile posters/poster-layout2.typ posters/poster-layout2.pdf

      - name: Compile Poster Layout 3
        run: typst compile posters/poster-layout3.typ posters/poster-layout3.pdf

      - name: Compile Poster Layout 4
        run: typst compile posters/poster-layout4.typ posters/poster-layout4.pdf

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-posters
          path: posters/*.pdf
